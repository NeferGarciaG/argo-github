# Argo CD Application that syncs the dev Kustomize overlay and emits GitHub notifications.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kustom-app-dev
  namespace: argocd
  labels:
    env: dev
  annotations:
    # Subscribes this app to the shared github-dispatch webhook when sync + health succeed.
    notifications.argoproj.io/subscribe.on-deployed-dispatch.github-dispatch: ""
    # GitHub repository that should receive the repository_dispatch event from this app.
    notify.github.owner: "NeferGarciaG" # organization
    notify.github.repo: "trigger-repo" # Real Pipeline
    notify.github.event_type: argo_deploy

spec:
  project: default
  source:
    repoURL: https://github.com/NeferGarciaG/argo-github.git
    targetRevision: main   # HEAD
    path: kustom-webapp/overlays/dev  # path
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
